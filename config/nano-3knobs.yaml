serial:
  port: /dev/ttyUSB0  # Adjust to your Arduino Nano port
  baud_rate: 9600

sliders:
  - id: 0
    name: "Master Volume"
    targets:
      - type: master

  - id: 1
    name: "Applications"
    targets:
      - type: application
        name: "Firefox"
      - type: application
        name: "Chrome"
      - type: application
        name: "Spotify"

  - id: 2
    name: "Microphone"
    targets:
      - type: source
        name: "default_microphone"

audio:
  noise_reduction: default
  smooth_transitions: true
  transition_duration_ms: 50

gui:
  theme: dark
  show_visualizers: true
  tray_icon: true
