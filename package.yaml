name: ioruba
version: 0.2.2
github: bernardopg/ioruba
license: MIT
author: Bernardo Gomes
maintainer: bernardopg@users.noreply.github.com
copyright: 2025 Bernardo Gomes
extra-source-files:
  - README.md
  - CLAUDE.md
  - CHANGELOG.md
synopsis: Hardware-driven Linux audio mixer with a Haskell runtime
category: Audio
description: |
  Ioruba is a Linux audio control system that bridges physical hardware
  (Arduino Nano knobs and sliders) with PipeWire or PulseAudio. Built with
  Haskell, it now focuses on a real runtime, modern release automation, and a
  distribution-friendly product path.
dependencies:
  - base >= 4.7 && < 5
  - text
  - bytestring
  - stm
  - async
  - containers
  - unordered-containers
  - vector
  - aeson
  - yaml
  - mtl
  - transformers
  - exceptions
  - filepath
  - directory
  - unix
  - process
  - time
  - QuickCheck
  - ansi-terminal
  - split
  - extra
  - serialport
ghc-options:
  - '-Wall'
  - '-Wcompat'
  - '-Widentities'
  - '-Wincomplete-record-updates'
  - '-Wincomplete-uni-patterns'
  - '-Wmissing-export-lists'
  - '-Wredundant-constraints'
  - '-Wno-unused-top-binds'
library:
  source-dirs: src
  exposed-modules:
    - Audio.Backend
    - Audio.Mixer
    - Audio.PulseAudio
    - Audio.Sink
    - Audio.Source
    - GUI.MainWindow
    - Hardware.Device
    - Hardware.Serial
    - Hardware.Protocol
    - Config.Types
    - Config.Parser
    - Config.Validation
    - Utils.Error
executables:
  ioruba:
    main: Main.hs
    source-dirs: app
    ghc-options:
      - '-threaded'
      - '-rtsopts'
      - '-with-rtsopts=-N'
    dependencies:
      - ioruba
    when:
      - condition: false
        other-modules: Paths_ioruba
  test-serial:
    main: Main.hs
    source-dirs: app/test-serial
    ghc-options:
      - '-threaded'
      - '-rtsopts'
      - '-with-rtsopts=-N'
    dependencies:
      - ioruba
tests:
  ioruba-test:
    main: Spec.hs
    source-dirs: test
    ghc-options:
      - '-threaded'
      - '-rtsopts'
      - '-with-rtsopts=-N'
    dependencies:
      - ioruba
      - hspec
      - hspec-discover
      - QuickCheck
default-extensions:
  - OverloadedStrings
  - LambdaCase
  - RecordWildCards
  - TupleSections
  - DeriveGeneric
  - DeriveFunctor
  - GeneralizedNewtypeDeriving
  - StandaloneDeriving
  - FlexibleContexts
  - FlexibleInstances
  - MultiParamTypeClasses
  - TypeApplications
  - ScopedTypeVariables
  - BangPatterns
