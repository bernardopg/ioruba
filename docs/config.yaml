highlights:
  - title: Live Haskell runtime
    body: The main product path is now a real Haskell runtime that reads the Nano, maps knobs to targets, and drives Linux audio live.
  - title: Release-grade repository
    body: Pages, funding, release workflows, and metadata are being aligned so the repository feels like a product, not a dump of source files.
  - title: Clear hardware story
    body: The public positioning is centered on a practical Arduino Nano 3-knob setup for Linux creators, streamers, and makers.

screenshots:
  - title: Desktop overview
    caption: The current interface direction with a dark, product-first presentation.
    path: assets/screenshots/desktop-overview-pt-br.png
  - title: Knob deck
    caption: App-specific controls, animated dials, and practical mixer ergonomics.
    path: assets/screenshots/knob-deck-pt-br.png
  - title: English layout
    caption: An English-facing visual surface for a broader release audience.
    path: assets/screenshots/english-layout.png

product:
  audience:
    - Linux users who want tactile audio control
    - creators and streamers needing fast app-level volume changes
    - product-minded makers who care about finish, not just wiring
  pillars:
    - distributable Haskell runtime with live serial-to-audio control
    - Arduino Nano hardware flow that stays accessible to makers
    - modern Linux audio support through PipeWire and PulseAudio compatibility

distribution:
  items:
    - Automated release PRs and tagging through Release Please
    - Binary release bundles uploaded on version tags
    - GitHub Pages as the public product surface
    - Funding, support, and project identity wired into the repo itself

support:
  sponsors_blurb: Sponsorship helps fund polished Linux tools, hardware experiments, and product-focused open source work.
  qr_caption: Scan the QR code if you prefer direct support from your phone.
