[package]
name = "ioruba-desktop"
version = "0.3.0"
description = "Ioruba desktop control deck"
authors = ["Bernardo Gomes"]
license = "MIT"
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "ioruba_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.5.6", features = [] }

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tauri = { version = "2.10.3", features = [] }
tauri-plugin-serialplugin = "2.21.1"
thiserror = "2.0"
