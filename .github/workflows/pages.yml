name: Pages

on:
  push:
    branches:
      - main
    paths:
      - docs-site/**
      - scripts/build-pages.mjs
      - docs/**
      - README.md
      - QUICKSTART.md
      - NANO_SETUP.md
      - CONTRIBUTING.md
      - TESTING.md
      - TODO.md
      - CHANGELOG.md
      - FUNDING.md
      - package.json
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build docs site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22

      - name: Prepare documentation source
        run: npm run docs:prepare-site

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: .site-src
          destination: _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5.0.0
