name: Sync Repository Metadata

on:
  push:
    branches:
      - main
    paths:
      - docs/config.yaml
      - .github/scripts/sync_repo_metadata.py
      - .github/workflows/sync-metadata.yml
      - .github/requirements-pages.txt
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install metadata sync dependencies
        run: python -m pip install --requirement .github/requirements-pages.txt

      - name: Sync metadata
        env:
          GH_TOKEN: ${{ secrets.REPO_METADATA_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "REPO_METADATA_TOKEN is not configured. Skipping metadata sync."
            exit 0
          fi
          python .github/scripts/sync_repo_metadata.py
