name: Sync Repository Metadata

on:
  push:
    branches:
      - main
    paths:
      - docs/config.yaml
      - .github/scripts/sync_repo_metadata.py
      - .github/workflows/sync-metadata.yml
      - .github/requirements-pages.txt
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    if: ${{ secrets.REPO_METADATA_TOKEN != '' }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.REPO_METADATA_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install metadata sync dependencies
        run: python -m pip install --requirement .github/requirements-pages.txt

      - name: Sync metadata
        run: python .github/scripts/sync_repo_metadata.py
