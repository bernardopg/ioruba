name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  # Permite que o release.yml reuse este workflow como gate antes de publicar,
  # garantindo que os jobs por plataforma (incl. native-audio-smoke Windows/macOS)
  # passem ANTES de qualquer tag virar release.
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop-and-shared:
    name: Desktop And Shared
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            apps/desktop/src-tauri -> target

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libudev-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            libayatana-appindicator3-dev

      - name: Install NPM dependencies
        run: npm ci

      - name: Typecheck shared package
        run: npm run shared:typecheck

      - name: Typecheck desktop app
        run: npm run desktop:typecheck

      - name: Run shared tests with coverage
        run: npm --workspace @ioruba/shared run test -- --coverage

      - name: Run desktop tests with coverage
        run: npm --workspace @ioruba/desktop run test -- --coverage

      - name: Check Rust formatting
        run: cargo fmt --check --manifest-path apps/desktop/src-tauri/Cargo.toml

      - name: Lint Rust (clippy)
        run: cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml

      - name: Check glib vendor patch is still required
        shell: bash
        run: |
          # The vendored glib-0.18.5 backports GHSA-wrw7-89jp-8q8g while the
          # Tauri Linux stack resolves through the GTK3 glib 0.18.x line. When
          # upstream moves to glib >= 0.20 this gate fails so we remember to
          # drop the vendor override (see apps/desktop/src-tauri/vendor/README.md).
          set -euo pipefail
          lock="apps/desktop/src-tauri/Cargo.lock"
          versions="$(awk '/^name = "glib"$/{f=1;next} f&&/^version = /{gsub(/[",]/,"");print $3;f=0}' "$lock")"
          echo "Resolved glib versions:"
          echo "${versions}"
          if echo "${versions}" | grep -qvE '^0\.18\.'; then
            echo "::error::glib resolved outside 0.18.x — drop the vendored glib-0.18.5 patch in Cargo.toml and remove vendor/glib-0.18.5."
            exit 1
          fi

      - name: Build desktop app
        run: npm run desktop:build

      - name: Prepare docs site source
        run: npm run docs:prepare-site

  firmware-host:
    name: Firmware Host Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # Host tests of the pure config parser — no Arduino toolchain needed (g++).
      # The default run pins 3 knobs / 10-bit; the wide run exercises 8 knobs /
      # 12-bit, mirroring the Mega (>6 knobs) and ESP32/RP2040 (12-bit) targets.
      - name: Test firmware config parser (host, default)
        run: npm run firmware:test

      - name: Test firmware config parser (host, wide — 8 knobs / 12-bit)
        run: npm run firmware:test:wide

  firmware:
    name: Firmware (${{ matrix.fqbn }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        fqbn:
          - arduino:avr:nano
          - arduino:avr:uno
          - arduino:avr:mega
          - arduino:avr:leonardo
          - arduino:avr:micro

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Arduino CLI
        uses: ./.github/actions/setup-arduino-cli

      - name: Cache Arduino toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.arduino15
          key: arduino-avr-core-v1-${{ runner.os }}
          restore-keys: |
            arduino-avr-core-v1-

      - name: Install Arduino AVR core
        run: |
          arduino-cli config init --overwrite
          arduino-cli core update-index
          arduino-cli core install arduino:avr

      - name: Compile firmware (${{ matrix.fqbn }})
        run: arduino-cli compile --fqbn ${{ matrix.fqbn }} firmware/arduino/ioruba-controller

  firmware-arch:
    name: Firmware Arch (${{ matrix.target.key }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # 12-bit boards live behind their own arduino-cli cores (heavier than AVR),
    # so they get a dedicated matrix with separate caches. This validates the
    # adcBits=12 path end to end on real ESP32/RP2040 toolchains.
    strategy:
      fail-fast: false
      matrix:
        target:
          - key: esp32
            core: esp32:esp32
            fqbn: esp32:esp32:esp32
            url: https://espressif.github.io/arduino-esp32/package_esp32_index.json
          - key: rp2040
            core: rp2040:rp2040
            fqbn: rp2040:rp2040:rpipico
            url: https://github.com/earlephilhower/arduino-pico/releases/download/global/package_rp2040_index.json

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Arduino CLI
        uses: ./.github/actions/setup-arduino-cli

      - name: Cache Arduino toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.arduino15
          key: arduino-${{ matrix.target.key }}-core-v1-${{ runner.os }}
          restore-keys: |
            arduino-${{ matrix.target.key }}-core-v1-

      - name: Install ${{ matrix.target.core }} core
        run: |
          arduino-cli config init --overwrite
          arduino-cli core update-index --additional-urls ${{ matrix.target.url }}
          arduino-cli core install ${{ matrix.target.core }} --additional-urls ${{ matrix.target.url }}

      - name: Compile firmware (${{ matrix.target.fqbn }})
        run: arduino-cli compile --fqbn ${{ matrix.target.fqbn }} firmware/arduino/ioruba-controller

  scripts-lint:
    name: Installer Scripts Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # shellcheck ships on ubuntu-latest runners; lint the POSIX/bash installers.
      - name: ShellCheck installer and AppImage scripts
        run: shellcheck scripts/install.sh scripts/run-appimage-compat.sh scripts/validate-appimage.sh

      # pwsh ships on ubuntu-latest runners. Report warnings for visibility but
      # only fail the gate on PSScriptAnalyzer errors.
      - name: PSScriptAnalyzer (install.ps1)
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          $results = Invoke-ScriptAnalyzer -Path scripts/install.ps1 -Severity Warning,Error
          if ($results) { $results | Format-Table -AutoSize }
          $errors = @($results | Where-Object { $_.Severity -eq 'Error' })
          if ($errors.Count -gt 0) {
            Write-Error "PSScriptAnalyzer found $($errors.Count) error(s)"
            exit 1
          }

  native-audio-smoke:
    name: Native Audio Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          components: clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            apps/desktop/src-tauri -> target

      # The macOS/Windows audio backends are cfg-gated and never compiled on the
      # Linux gate. clippy compiles and lints the platform module; cargo test
      # links the test binary, validating the CoreAudio framework / WASAPI bindings.
      - name: Lint native audio backend (clippy)
        run: cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Build and test Rust backend
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml

  repo-smoke:
    name: Repo Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Validate core files
        run: |
          test -f firmware/arduino/ioruba-controller/ioruba-controller.ino
          test -f apps/desktop/src-tauri/tauri.conf.json

      - name: Validate workflow surface
        run: |
          test -f .github/workflows/ci.yml
          test -f .github/workflows/release.yml
          test -f .github/workflows/pages.yml
          test -f CONTRIBUTING.md
          test -f docs/guides/profile-examples.md
          test -f docs/debug/support.md
          test -f docs-site/_config.yml
          test -f scripts/build-pages.mjs
          test ! -d legacy
          test ! -d docs/migration
          test ! -f .github/workflows/release-please.yml
          test ! -f .github/workflows/sync-metadata.yml
          test ! -d app
          test ! -d src
          test ! -d test
          test ! -d config
          test ! -d arduino
          test ! -d assets
          test ! -d packaging
          test ! -f package.yaml
          test ! -f stack.yaml
          test ! -f Makefile
          test ! -f .github/release-please-config.json
          test ! -f docs/config.yaml
          test ! -f .github/workflows/pages-docs.yml
