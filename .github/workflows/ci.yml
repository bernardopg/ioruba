name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpulse-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            libsqlite3-dev

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6.6'
          enable-stack: true
          stack-version: 'latest'

      - name: Cache Stack dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.stack
            .stack-work
          key: ${{ runner.os }}-stack-${{ hashFiles('stack.yaml.lock') }}
          restore-keys: |
            ${{ runner.os }}-stack-

      - name: Build dependencies
        run: stack build --only-dependencies --test --no-run-tests

      - name: Build project
        run: stack build --test --no-run-tests

      - name: Run tests
        run: stack test --coverage

      - name: Generate coverage report
        run: stack hpc report --all

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage.txt
          flags: unittests
          name: codecov-ioruba

      - name: Run HLint
        run: |
          stack install hlint
          hlint src/

  formatting:
    name: Code Formatting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6.6'
          enable-stack: true

      - name: Install Ormolu
        run: stack install ormolu

      - name: Check formatting
        run: |
          find src -name "*.hs" -exec ormolu --mode check {} \;
