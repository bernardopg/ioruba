name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpulse-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            libsqlite3-dev

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6.6'
          enable-stack: true
          stack-version: 'latest'

      - name: Cache Stack dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.stack
            .stack-work
          key: ${{ runner.os }}-stack-${{ hashFiles('stack.yaml.lock', 'package.yaml') }}
          restore-keys: |
            ${{ runner.os }}-stack-

      - name: Build dependencies
        run: stack build --only-dependencies --test --no-run-tests

      - name: Build project
        run: stack build --test --no-run-tests --pedantic

      - name: Run tests
        run: stack test

  lint:
    name: Lint (HLint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run HLint
        uses: haskell-actions/hlint-setup@v2

      - name: Apply HLint
        uses: haskell-actions/hlint-run@v2
        with:
          path: src/
          fail-on: warning

  formatting:
    name: Code Formatting (Ormolu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Ormolu
        uses: haskell-actions/run-ormolu@v16
        with:
          pattern: |
            src/**/*.hs
            app/**/*.hs
            test/**/*.hs
