name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop-and-shared:
    name: Desktop And Shared
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            apps/desktop/src-tauri -> target

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libudev-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            libayatana-appindicator3-dev

      - name: Install NPM dependencies
        run: npm ci

      - name: Typecheck shared package
        run: npm run shared:typecheck

      - name: Typecheck desktop app
        run: npm run desktop:typecheck

      - name: Run shared tests with coverage
        run: npm --workspace @ioruba/shared run test -- --coverage

      - name: Run desktop tests with coverage
        run: npm --workspace @ioruba/desktop run test -- --coverage

      - name: Check Rust formatting
        run: cargo fmt --check --manifest-path apps/desktop/src-tauri/Cargo.toml

      - name: Lint Rust (clippy)
        run: cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml

      - name: Build desktop app
        run: npm run desktop:build

      - name: Prepare docs site source
        run: npm run docs:prepare-site

  firmware:
    name: Firmware
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@81d310742121c928ea9c8bbd407b4217b432ae02 # v2.0.0

      - name: Cache Arduino toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.arduino15
          key: arduino-avr-core-${{ runner.os }}

      - name: Install Arduino AVR core
        run: |
          arduino-cli config init --overwrite
          arduino-cli core update-index
          arduino-cli core install arduino:avr

      - name: Compile firmware
        run: npm run firmware:compile

  repo-smoke:
    name: Repo Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Validate migration docs
        run: |
          test -f docs/migration/complete-plan.md
          test -f docs/migration/github-plan.md
          test -f docs/migration/logic-audit.md
          test -f firmware/arduino/ioruba-controller/ioruba-controller.ino
          test -f apps/desktop/src-tauri/tauri.conf.json

      - name: Validate workflow surface
        run: |
          test -f .github/workflows/ci.yml
          test -f .github/workflows/release.yml
          test -f .github/workflows/pages.yml
          test -f CONTRIBUTING.md
          test -f legacy/README.md
          test -f legacy/arduino-audio-controller/README.md
          test -f docs/guides/profile-examples.md
          test -f docs/debug/support.md
          test -f docs-site/_config.yml
          test -f scripts/build-pages.mjs
          test ! -d legacy/haskell-runtime
          test ! -d legacy/github-automation
          test ! -f .github/workflows/release-please.yml
          test ! -f .github/workflows/sync-metadata.yml
          test ! -d app
          test ! -d src
          test ! -d test
          test ! -d config
          test ! -d arduino
          test ! -d assets
          test ! -d packaging
          test ! -f package.yaml
          test ! -f stack.yaml
          test ! -f Makefile
          test ! -f .github/release-please-config.json
          test ! -f docs/config.yaml
          test ! -f .github/workflows/pages-docs.yml
