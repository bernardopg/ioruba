name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop-and-shared:
    name: Desktop And Shared
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: |
            apps/desktop/src-tauri -> target

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libudev-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf

      - name: Install NPM dependencies
        run: npm ci

      - name: Typecheck shared package
        run: npm run shared:typecheck

      - name: Typecheck desktop app
        run: npm run desktop:typecheck

      - name: Run shared tests
        run: npm run shared:test

      - name: Run desktop tests
        run: npm run desktop:test

      - name: Run Rust tests
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml

      - name: Build desktop app
        run: npm run desktop:build

  firmware:
    name: Firmware
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2.0.0

      - name: Install Arduino AVR core
        run: |
          arduino-cli config init --overwrite
          arduino-cli core update-index
          arduino-cli core install arduino:avr

      - name: Compile firmware
        run: npm run firmware:compile

  repo-smoke:
    name: Repo Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Validate migration docs
        run: |
          test -f docs/migration/complete-plan.md
          test -f docs/migration/github-plan.md
          test -f docs/migration/logic-audit.md
          test -f firmware/arduino/ioruba-controller/ioruba-controller.ino
          test -f apps/desktop/src-tauri/tauri.conf.json

      - name: Validate workflow surface
        run: |
          test -f .github/workflows/ci.yml
          test -f .github/workflows/release.yml
          test -f CONTRIBUTING.md
          test -f legacy/README.md
          test -f legacy/arduino-audio-controller/README.md
          test -f docs/guides/profile-examples.md
          test -f docs/debug/support.md
          test ! -d legacy/haskell-runtime
          test ! -d legacy/github-automation
          test ! -f .github/workflows/release-please.yml
          test ! -f .github/workflows/pages.yml
          test ! -f .github/workflows/sync-metadata.yml
          test ! -d app
          test ! -d src
          test ! -d test
          test ! -d config
          test ! -d arduino
          test ! -d assets
          test ! -d packaging
          test ! -f package.yaml
          test ! -f stack.yaml
          test ! -f Makefile
          test ! -f .github/release-please-config.json
          test ! -f docs/config.yaml
