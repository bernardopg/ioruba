name: Docs Auto Update

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: docs-autoupdate-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  update-docs:
    name: Update Docs
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install NPM dependencies
        run: npm ci

      - name: Prepare docs site source
        run: npm run docs:prepare-site

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Try docs update with Copilot
        id: copilot_docs
        continue-on-error: true
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
        shell: bash
        run: |
          set -euo pipefail

          cat > "${RUNNER_TEMP}/copilot-docs-prompt.txt" <<'EOF'
          Analyze the current repository state on main and update documentation only when necessary.

          Allowed targets:
          - README.md
          - CONTRIBUTING.md
          - docs/
          - docs-site/

          Requirements:
          - Do not modify application source code, tests, workflows, firmware, or release assets
          - Do not modify CHANGELOG.md
          - Preserve existing markdown and docs-site structure
          - Keep wording factual, concise, and aligned with the actual repository
          - Do not invent commands, APIs, supported platforms, hardware behavior, setup steps, or roadmap items
          - Prefer correcting stale documentation and synchronizing examples with the current repo layout
          EOF

          copilot -p "$(cat "${RUNNER_TEMP}/copilot-docs-prompt.txt")" \
            --allow-tool=read \
            --allow-tool=write \
            --allow-tool=shell \
            --no-ask-user

      - name: Fallback to Codex for docs
        id: codex_docs
        if: steps.copilot_docs.outcome != 'success'
        continue-on-error: true
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            Analyze the current repository state on main and update documentation only when necessary.

            Allowed targets:
            - README.md
            - CONTRIBUTING.md
            - docs/
            - docs-site/

            Requirements:
            - Do not modify application source code, tests, workflows, firmware, or release assets
            - Do not modify CHANGELOG.md
            - Preserve existing markdown and docs-site structure
            - Keep wording factual, concise, and aligned with the actual repository
            - Do not invent commands, APIs, supported platforms, hardware behavior, setup steps, or roadmap items
            - Prefer correcting stale documentation and synchronizing examples with the current repo layout
          sandbox: workspace-write
          safety-strategy: drop-sudo

      - name: Stop if docs agent failed
        if: >
          steps.copilot_docs.outcome != 'success' &&
          steps.codex_docs.outcome != 'success'
        run: |
          echo "Both docs agents failed; refusing to commit partial documentation changes." >&2
          exit 1

      - name: Validate docs changes
        id: docs_diff
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t changed_files < <(
            git status --porcelain=v1 |
              sed -E 's/^...//' |
              sed -E 's/^.* -> //'
          )

          disallowed_files=()
          for file in "${changed_files[@]}"; do
            [ -n "${file}" ] || continue
            case "${file}" in
              README.md|CONTRIBUTING.md|docs/*|docs-site/*)
                ;;
              *)
                disallowed_files+=("${file}")
                ;;
            esac
          done

          if [ "${#disallowed_files[@]}" -gt 0 ]; then
            printf 'Docs agent modified files outside the allowed documentation surface:\n' >&2
            printf ' - %s\n' "${disallowed_files[@]}" >&2
            exit 1
          fi

          npm run docs:prepare-site

          : > .docs-changed-files
          if [ "${#changed_files[@]}" -gt 0 ]; then
            printf '%s\n' "${changed_files[@]}" > .docs-changed-files
          fi

      - name: Commit docs changes if any
        id: docs_commit
        shell: bash
        run: |
          set -euo pipefail

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          git add README.md CONTRIBUTING.md docs docs-site

          if git diff --cached --quiet; then
            echo "No documentation changes detected."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "docs: sync repository documentation"
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Push docs changes if any
        id: docs_push
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ steps.docs_commit.outputs.committed }}" != "true" ]; then
            echo "No documentation commit to push."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch origin main
          expected_sha="${{ github.event.workflow_run.head_sha }}"
          current_main="$(git rev-parse origin/main)"

          if [ "${current_main}" != "${expected_sha}" ]; then
            echo "origin/main moved from ${expected_sha} to ${current_main}; skipping docs push."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git log --format=%s -n 1 HEAD | grep -Fxq "docs: sync repository documentation"; then
            git push origin HEAD:main
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Unexpected HEAD commit; refusing to push."
            exit 1
          fi

      - name: Write workflow summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Docs Auto Update"
            echo
            echo "- Trigger SHA: \`${{ github.event.workflow_run.head_sha }}\`"
            echo "- Copilot outcome: \`${{ steps.copilot_docs.outcome }}\`"
            echo "- Codex outcome: \`${{ steps.codex_docs.outcome }}\`"
            echo "- Commit created: \`${{ steps.docs_commit.outputs.committed || 'false' }}\`"
            echo "- Pushed to main: \`${{ steps.docs_push.outputs.pushed || 'false' }}\`"
            echo
            echo "### Changed Files"
            if [ -s .docs-changed-files ]; then
              while IFS= read -r file; do
                [ -n "${file}" ] && echo "- \`${file}\`"
              done < .docs-changed-files
            else
              echo "No documentation file changes."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
