name: Docs Auto Update

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: docs-autoupdate-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  update-docs:
    name: Update Docs
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: |
            apps/desktop/src-tauri -> target

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libudev-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            libayatana-appindicator3-dev

      - name: Install NPM dependencies
        run: npm ci

      - name: Prepare docs site source
        run: npm run docs:prepare-site

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Try docs update with Copilot
        id: copilot_docs
        continue-on-error: true
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
        shell: bash
        run: |
          set -euo pipefail

          cat > .copilot-docs-prompt.txt <<'EOF'
          Analyze the current repository state on main and update documentation only when necessary.

          Allowed targets:
          - README.md
          - CONTRIBUTING.md
          - docs/
          - docs-site/

          Requirements:
          - Do not modify application source code, tests, workflows, firmware, or release assets
          - Do not modify CHANGELOG.md
          - Preserve existing markdown and docs-site structure
          - Keep wording factual, concise, and aligned with the actual repository
          - Do not invent commands, APIs, supported platforms, hardware behavior, setup steps, or roadmap items
          - Prefer correcting stale documentation and synchronizing examples with the current repo layout
          EOF

          copilot -p "$(cat .copilot-docs-prompt.txt)" \
            --allow-tool=read \
            --allow-tool=write \
            --no-ask-user

      - name: Fallback to Codex for docs
        id: codex_docs
        if: steps.copilot_docs.outcome != 'success'
        continue-on-error: true
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            Analyze the current repository state on main and update documentation only when necessary.

            Allowed targets:
            - README.md
            - CONTRIBUTING.md
            - docs/
            - docs-site/

            Requirements:
            - Do not modify application source code, tests, workflows, firmware, or release assets
            - Do not modify CHANGELOG.md
            - Preserve existing markdown and docs-site structure
            - Keep wording factual, concise, and aligned with the actual repository
            - Do not invent commands, APIs, supported platforms, hardware behavior, setup steps, or roadmap items
            - Prefer correcting stale documentation and synchronizing examples with the current repo layout
          sandbox: workspace-write
          safety-strategy: drop-sudo

      - name: Commit docs changes if any
        shell: bash
        run: |
          set -euo pipefail

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          git add README.md CONTRIBUTING.md docs docs-site

          if git diff --cached --quiet; then
            echo "No documentation changes detected."
            exit 0
          fi

          git commit -m "docs: sync repository documentation"

      - name: Push docs changes if any
        shell: bash
        run: |
          set -euo pipefail

          if git log --format=%s -n 1 HEAD | grep -Fxq "docs: sync repository documentation"; then
            git push origin HEAD:main
          else
            echo "No documentation commit to push."
          fi