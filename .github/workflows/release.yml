name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop-bundles:
    name: Desktop Bundles (${{ matrix.platform }})
    timeout-minutes: 90
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: "--bundles deb,rpm"
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: ""
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: |
            apps/desktop/src-tauri -> target

      - name: Install Linux desktop dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libudev-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            libayatana-appindicator3-dev

      - name: Install dependencies
        run: npm ci

      - name: Build and upload installers
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: Ioruba ${{ github.ref_name }}
          releaseBody: |
            Cross-platform installers for the Tauri 2 desktop app.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  desktop-appimage:
    name: Desktop AppImage
    timeout-minutes: 90
    needs:
      - desktop-bundles
    permissions:
      contents: write
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: |
            apps/desktop/src-tauri -> target

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libudev-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            libayatana-appindicator3-dev

      - name: Install dependencies
        run: npm ci

      - name: Build and upload AppImage
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: Ioruba ${{ github.ref_name }}
          releaseBody: |
            Cross-platform installers for the Tauri 2 desktop app.
          releaseDraft: false
          prerelease: false
          args: --bundles appimage

  arch-pkgbuild:
    name: Arch Packaging Metadata
    needs:
      - desktop-bundles
      - desktop-appimage
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Generate PKGBUILD
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          REPO="${GITHUB_REPOSITORY}"

          mkdir -p release-dist/arch

          RELEASE_JSON="$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/releases/tags/${TAG}")"

          APPIMAGE_ASSET_NAME="$(printf '%s' "${RELEASE_JSON}" | jq -r '.assets[]?.name | select(test("\\.AppImage$"; "i"))' | head -n 1)"

          if [[ -z "${APPIMAGE_ASSET_NAME}" ]]; then
            echo "No AppImage asset found in release ${TAG}."
            exit 1
          fi

          APPIMAGE_ASSET_URL="$(printf '%s' "${RELEASE_JSON}" | jq -r --arg NAME "${APPIMAGE_ASSET_NAME}" '.assets[] | select(.name == $NAME) | .browser_download_url')"

          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/octet-stream" \
            -o "release-dist/arch/${APPIMAGE_ASSET_NAME}" \
            "${APPIMAGE_ASSET_URL}"

          APPIMAGE_SHA256="$(sha256sum "release-dist/arch/${APPIMAGE_ASSET_NAME}" | awk '{print $1}')"
          ICON_SHA256="$(sha256sum "apps/desktop/src-tauri/icons/128x128.png" | awk '{print $1}')"

          git archive \
            --format=tar.gz \
            --prefix="ioruba-${VERSION}/" \
            -o "release-dist/arch/ioruba-${VERSION}.tar.gz" \
            "$TAG"

          SOURCE_SHA256="$(sha256sum "release-dist/arch/ioruba-${VERSION}.tar.gz" | awk '{print $1}')"

          cat > "release-dist/arch/PKGBUILD" <<EOF
          pkgname=ioruba-desktop
          pkgver=${VERSION}
          pkgrel=1
          pkgdesc="Tactile audio mixer for Arduino-based Linux control"
          arch=('x86_64')
          url="https://github.com/bernardopg/ioruba"
          license=('MIT')
          depends=('glibc' 'gtk3' 'webkit2gtk-4.1' 'libayatana-appindicator')
          makedepends=('npm' 'rust' 'cargo' 'pkgconf' 'webkit2gtk-4.1' 'gtk3' 'librsvg' 'patchelf' 'libappindicator-gtk3')
          source=("ioruba-\${pkgver}.tar.gz::https://github.com/bernardopg/ioruba/archive/refs/tags/v\${pkgver}.tar.gz")
          sha256sums=('${SOURCE_SHA256}')

          prepare() {
            cd "ioruba-\${pkgver}"
            npm ci
          }

          build() {
            cd "ioruba-\${pkgver}"
            npm --workspace @ioruba/desktop run tauri build -- --no-bundle
          }

          package() {
            cd "ioruba-\${pkgver}"

            install -Dm755 \
              "apps/desktop/src-tauri/target/release/ioruba-desktop" \
              "\${pkgdir}/usr/bin/ioruba-desktop"

            install -Dm644 \
              "apps/desktop/src-tauri/icons/128x128.png" \
              "\${pkgdir}/usr/share/icons/hicolor/128x128/apps/ioruba.png"

            install -Dm644 /dev/null "\${pkgdir}/usr/share/applications/ioruba.desktop"
            printf '%s\n' \
              '[Desktop Entry]' \
              'Type=Application' \
              'Name=Ioruba' \
              'Comment=Tactile audio mixer for Arduino-based Linux control' \
              'Exec=ioruba-desktop' \
              'Icon=ioruba' \
              'Categories=AudioVideo;Audio;' \
              'Terminal=false' \
              > "\${pkgdir}/usr/share/applications/ioruba.desktop"
          }
          EOF

          cat > "release-dist/arch/.SRCINFO" <<EOF
          pkgbase = ioruba-desktop
            pkgdesc = Tactile audio mixer for Arduino-based Linux control
            pkgver = ${VERSION}
            pkgrel = 1
            url = https://github.com/bernardopg/ioruba
            arch = x86_64
            license = MIT
            makedepends = npm
            makedepends = rust
            makedepends = cargo
            makedepends = pkgconf
            makedepends = webkit2gtk-4.1
            makedepends = gtk3
            makedepends = librsvg
            makedepends = patchelf
            makedepends = libappindicator-gtk3
            depends = glibc
            depends = gtk3
            depends = webkit2gtk-4.1
            depends = libayatana-appindicator
            source = ioruba-\${pkgver}.tar.gz::https://github.com/bernardopg/ioruba/archive/refs/tags/v\${pkgver}.tar.gz
            sha256sums = ${SOURCE_SHA256}

          pkgname = ioruba-desktop
          EOF

          cat > "release-dist/arch/PKGBUILD-bin" <<EOF
          pkgname=ioruba-desktop-bin
          pkgver=${VERSION}
          pkgrel=1
          pkgdesc="Tactile audio mixer for Arduino-based Linux control (prebuilt AppImage)"
          arch=('x86_64')
          url="https://github.com/bernardopg/ioruba"
          license=('MIT')
          depends=('glibc' 'gtk3' 'webkit2gtk-4.1' 'libayatana-appindicator')
          provides=('ioruba-desktop')
          conflicts=('ioruba-desktop')
          source=(
            "${APPIMAGE_ASSET_NAME}::https://github.com/bernardopg/ioruba/releases/download/v\${pkgver}/${APPIMAGE_ASSET_NAME}"
            "ioruba.png::https://raw.githubusercontent.com/bernardopg/ioruba/v\${pkgver}/apps/desktop/src-tauri/icons/128x128.png"
          )
          sha256sums=('${APPIMAGE_SHA256}' '${ICON_SHA256}')

          package() {
            install -Dm755 "\${srcdir}/${APPIMAGE_ASSET_NAME}" "\${pkgdir}/opt/ioruba/ioruba.AppImage"
            install -Dm644 "\${srcdir}/ioruba.png" "\${pkgdir}/usr/share/icons/hicolor/128x128/apps/ioruba.png"
            install -Dm644 /dev/null "\${pkgdir}/usr/share/applications/ioruba.desktop"

            printf '%s\n' \
              '[Desktop Entry]' \
              'Type=Application' \
              'Name=Ioruba' \
              'Comment=Tactile audio mixer for Arduino-based Linux control' \
              'Exec=ioruba-desktop' \
              'Icon=ioruba' \
              'Categories=AudioVideo;Audio;' \
              'Terminal=false' \
              > "\${pkgdir}/usr/share/applications/ioruba.desktop"

            install -Dm755 /dev/null "\${pkgdir}/usr/bin/ioruba-desktop"
            cat > "\${pkgdir}/usr/bin/ioruba-desktop" <<'LAUNCHER'
            #!/usr/bin/env sh
            set -eu

            APPIMAGE="/opt/ioruba/ioruba.AppImage"
            CACHE_ROOT="${XDG_CACHE_HOME:-${HOME}/.cache}/ioruba/appimage-runtime"

            if [ ! -r "${APPIMAGE}" ]; then
              echo "Ioruba AppImage nao encontrado em ${APPIMAGE}" >&2
              exit 1
            fi

            APP_SHA="$(sha256sum "${APPIMAGE}" | awk '{print $1}')"
            RUNTIME_DIR="${CACHE_ROOT}/${APP_SHA}"
            APPDIR="${RUNTIME_DIR}/squashfs-root"

            if [ ! -x "${APPDIR}/AppRun" ]; then
              rm -rf "${RUNTIME_DIR}"
              mkdir -p "${RUNTIME_DIR}"
              (
                cd "${RUNTIME_DIR}"
                "${APPIMAGE}" --appimage-extract >/dev/null
              )

              rm -f \
                "${APPDIR}/usr/lib/libwayland-egl.so.1" \
                "${APPDIR}/usr/lib/libwayland-client.so.0" \
                "${APPDIR}/usr/lib/libwayland-cursor.so.0" \
                "${APPDIR}/usr/lib/libwayland-server.so.0"
            fi

            if [ -x "${APPDIR}/AppRun" ]; then
              exec "${APPDIR}/AppRun" "$@"
            fi

            exec "${APPIMAGE}" "$@"
            LAUNCHER
            chmod 755 "\${pkgdir}/usr/bin/ioruba-desktop"
          }
          EOF

          cat > "release-dist/arch/.SRCINFO-bin" <<EOF
          pkgbase = ioruba-desktop-bin
            pkgdesc = Tactile audio mixer for Arduino-based Linux control (prebuilt AppImage)
            pkgver = ${VERSION}
            pkgrel = 1
            url = https://github.com/bernardopg/ioruba
            arch = x86_64
            license = MIT
            provides = ioruba-desktop
            conflicts = ioruba-desktop
            depends = glibc
            depends = gtk3
            depends = webkit2gtk-4.1
            depends = libayatana-appindicator
            source = ${APPIMAGE_ASSET_NAME}::https://github.com/bernardopg/ioruba/releases/download/v\${pkgver}/${APPIMAGE_ASSET_NAME}
            source = ioruba.png::https://raw.githubusercontent.com/bernardopg/ioruba/v\${pkgver}/apps/desktop/src-tauri/icons/128x128.png
            sha256sums = ${APPIMAGE_SHA256}
            sha256sums = ${ICON_SHA256}

          pkgname = ioruba-desktop-bin
          EOF

          cp \
            "release-dist/arch/PKGBUILD" \
            "release-dist/arch/PKGBUILD-v${VERSION}"

          cp \
            "release-dist/arch/PKGBUILD-bin" \
            "release-dist/arch/PKGBUILD-bin-v${VERSION}"

      - name: Upload PKGBUILD to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release-dist/arch/PKGBUILD
            release-dist/arch/.SRCINFO
            release-dist/arch/PKGBUILD-v*
            release-dist/arch/PKGBUILD-bin
            release-dist/arch/.SRCINFO-bin
            release-dist/arch/PKGBUILD-bin-v*
            release-dist/arch/ioruba-*.tar.gz

  firmware:
    name: Firmware Bundle
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2.0.0

      - name: Install Arduino AVR core
        run: |
          arduino-cli config init --overwrite
          arduino-cli core update-index
          arduino-cli core install arduino:avr

      - name: Build firmware
        run: |
          mkdir -p release-dist
          arduino-cli compile \
            --fqbn arduino:avr:nano \
            --output-dir release-dist/firmware \
            firmware/arduino/ioruba-controller

      - name: Upload firmware to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release-dist/firmware/*
