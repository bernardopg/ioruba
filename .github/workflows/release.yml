name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to target when dispatching manually (e.g. v0.6.10)"
        required: true
        type: string

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-release-notes:
    name: Prepare Release Notes
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate RELEASE_TAG
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${RELEASE_TAG}" ]]; then
            echo "RELEASE_TAG is empty — aborting." >&2
            exit 1
          fi
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "RELEASE_TAG '${RELEASE_TAG}' does not match expected format vX.Y.Z — aborting." >&2
            exit 1
          fi

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          TAG="${RELEASE_TAG}"
          VERSION="${TAG#v}"

          PREV_TAG="$(git tag --sort=-version:refname | grep '^v' | grep -Fxv "${TAG}" | head -n 1 || true)"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "prev_tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"

          if [ -n "${PREV_TAG}" ]; then
            git log "${PREV_TAG}..origin/main" --pretty=format:'- %s' > .release-commits.txt
          else
            git log origin/main --pretty=format:'- %s' > .release-commits.txt
          fi

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Try CHANGELOG update with Copilot
        id: copilot_changelog
        continue-on-error: true
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
        shell: bash
        run: |
          set -euo pipefail

          cat > .copilot-release-prompt.txt <<EOF
          Update CHANGELOG.md for release ${RELEASE_TAG}.

          Context:
          - Current release version: ${RELEASE_TAG}
          - Previous release tag: ${{ steps.meta.outputs.prev_tag }}
          - Commit summary is in .release-commits.txt

          Requirements:
          - Update only CHANGELOG.md
          - Preserve the existing markdown style and section structure
          - Add or update an entry for ${RELEASE_TAG}
          - Base the summary only on:
            1. the repository contents
            2. the commit messages in .release-commits.txt
          - Do not invent features, fixes, breaking changes, platforms, APIs, hardware support, or migrations
          - Keep the entry concise and release-oriented
          - Prefer factual bullet points
          EOF

          copilot -p "$(cat .copilot-release-prompt.txt)" \
            --allow-tool=read \
            --allow-tool=write \
            --no-ask-user

      - name: Fallback to Codex for CHANGELOG
        id: codex_changelog
        if: steps.copilot_changelog.outcome != 'success'
        continue-on-error: true
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            Update CHANGELOG.md for release ${{ env.RELEASE_TAG }}.

            Context:
            - Current release version: ${{ env.RELEASE_TAG }}
            - Previous release tag: ${{ steps.meta.outputs.prev_tag }}
            - Commit summary is in .release-commits.txt

            Requirements:
            - Update only CHANGELOG.md
            - Preserve the existing markdown style and section structure
            - Add or update an entry for ${{ env.RELEASE_TAG }}
            - Base the summary only on:
              1. the repository contents
              2. the commit messages in .release-commits.txt
            - Do not invent features, fixes, breaking changes, platforms, APIs, hardware support, or migrations
            - Keep the entry concise and release-oriented
            - Prefer factual bullet points
          sandbox: workspace-write
          safety-strategy: drop-sudo

      - name: Commit changelog update if any
        shell: bash
        run: |
          set -euo pipefail

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          git add CHANGELOG.md

          if git diff --cached --quiet; then
            echo "No CHANGELOG changes detected."
            exit 0
          fi

          git commit -m "docs: update changelog for ${RELEASE_TAG}"

      - name: Push changelog to main if any
        shell: bash
        run: |
          set -euo pipefail

          if ! git log --format=%s -n 1 HEAD | grep -Fxq "docs: update changelog for ${RELEASE_TAG}"; then
            echo "No changelog commit to push."
            exit 0
          fi

          git fetch origin main
          if ! git rebase origin/main; then
            git rebase --abort
            echo "Rebase failed — origin/main moved concurrently; aborting." >&2
            exit 1
          fi

          git push origin HEAD:main

  desktop-bundles:
    name: Desktop Bundles (${{ matrix.platform }})
    needs:
      - prepare-release-notes
    timeout-minutes: 90
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: "--bundles deb,rpm"
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            # DMG packaging can fail on GitHub-hosted macOS runners because
            # Tauri's generated bundle script invokes Finder/AppleScript
            # operations that are not always authorized in CI. Build the .app
            # bundle instead so the release can still publish the macOS binary.
            args: "--bundles app"
    runs-on: ${{ matrix.platform }}
    # Secrets cannot be referenced in step-level `if:` expressions directly.
    # Expose them as env vars at the job level so step conditionals can use
    # `env.VAR != ''` which is a valid named-value in that context.
    env:
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: |
            apps/desktop/src-tauri -> target

      - name: Install Linux desktop dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libudev-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            libayatana-appindicator3-dev

      - name: Install dependencies
        run: npm ci

      - name: Import Windows certificate
        if: matrix.platform == 'windows-latest' && env.WINDOWS_CERTIFICATE != ''
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path certificate | Out-Null
          Set-Content -Path certificate/tempCert.txt -Value $env:WINDOWS_CERTIFICATE
          certutil -decode certificate/tempCert.txt certificate/certificate.pfx
          Remove-Item -Path certificate/tempCert.txt
          $pwd = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText
          $cert = Import-PfxCertificate -FilePath certificate/certificate.pfx `
            -CertStoreLocation Cert:\CurrentUser\My -Password $pwd
          echo "WINDOWS_CERTIFICATE_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV
          Remove-Item -Path certificate/certificate.pfx

      - name: Import Apple Developer certificate
        if: matrix.platform == 'macos-latest' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm -f certificate.p12
          CERT_IDENTITY=$(security find-identity -v -p codesigning build.keychain \
            | grep -o '"[^"]*"' | head -n 1 | tr -d '"')
          echo "APPLE_SIGNING_IDENTITY=$CERT_IDENTITY" >> "$GITHUB_ENV"

      - name: Build and upload installers (with signing)
        if: env.APPLE_CERTIFICATE != '' || matrix.platform != 'macos-latest'
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_WINDOWS_CERTIFICATE_THUMBPRINT: ${{ env.WINDOWS_CERTIFICATE_THUMBPRINT }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: Ioruba ${{ env.RELEASE_TAG }}
          releaseBody: |
            Cross-platform installers for the Tauri 2 desktop app.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Build and upload installers (unsigned macOS)
        # tauri-action passes APPLE_CERTIFICATE even when empty, triggering a
        # codesign attempt that fails on unsigned CI runners. Run without any
        # signing env vars when no Apple certificate secret is configured.
        if: env.APPLE_CERTIFICATE == '' && matrix.platform == 'macos-latest'
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: Ioruba ${{ env.RELEASE_TAG }}
          releaseBody: |
            Cross-platform installers for the Tauri 2 desktop app.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Clean up keychain
        if: matrix.platform == 'macos-latest' && always()
        run: |
          security delete-keychain build.keychain 2>/dev/null || true

  desktop-appimage:
    name: Desktop AppImage
    timeout-minutes: 90
    needs:
      - desktop-bundles
    if: ${{ always() && needs.desktop-bundles.result != 'cancelled' }}
    permissions:
      contents: write
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: |
            apps/desktop/src-tauri -> target

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libudev-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            libayatana-appindicator3-dev

      - name: Install dependencies
        run: npm ci

      - name: Build and upload AppImage
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: Ioruba ${{ env.RELEASE_TAG }}
          releaseBody: |
            Cross-platform installers for the Tauri 2 desktop app.
          releaseDraft: false
          prerelease: false
          args: --bundles appimage

  arch-pkgbuild:
    name: Arch Packaging Metadata
    needs:
      - desktop-bundles
      - desktop-appimage
    if: ${{ always() && needs.desktop-bundles.result != 'cancelled' && needs.desktop-appimage.result != 'cancelled' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Generate PKGBUILD
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${RELEASE_TAG}"
          VERSION="${TAG#v}"
          REPO="${GITHUB_REPOSITORY}"

          mkdir -p release-dist/arch

          RELEASE_JSON="$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/releases/tags/${TAG}")"

          APPIMAGE_ASSET_NAME="$(printf '%s' "${RELEASE_JSON}" | jq -r '.assets[]?.name | select(test("\\.AppImage$"; "i"))' | head -n 1)"

          if [[ -z "${APPIMAGE_ASSET_NAME}" ]]; then
            echo "No AppImage asset found in release ${TAG}."
            exit 1
          fi

          APPIMAGE_ASSET_URL="$(printf '%s' "${RELEASE_JSON}" | jq -r --arg NAME "${APPIMAGE_ASSET_NAME}" '.assets[] | select(.name == $NAME) | .browser_download_url')"

          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/octet-stream" \
            -o "release-dist/arch/${APPIMAGE_ASSET_NAME}" \
            "${APPIMAGE_ASSET_URL}"

          APPIMAGE_SHA256="$(sha256sum "release-dist/arch/${APPIMAGE_ASSET_NAME}" | awk '{print $1}')"
          ICON_SHA256="$(sha256sum "apps/desktop/src-tauri/icons/128x128.png" | awk '{print $1}')"
          ICON_SVG_SHA256="$(sha256sum "apps/desktop/src-tauri/icons/app-icon.svg" | awk '{print $1}')"

          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -o "release-dist/arch/ioruba-${VERSION}.tar.gz" \
            "https://github.com/${REPO}/archive/refs/tags/${TAG}.tar.gz"

          SOURCE_SHA256="$(sha256sum "release-dist/arch/ioruba-${VERSION}.tar.gz" | awk '{print $1}')"
          COMPAT_SHA256="$(sha256sum "scripts/run-appimage-compat.sh" | awk '{print $1}')"

          cat > "release-dist/arch/PKGBUILD" <<EOF
          pkgname=ioruba-desktop
          pkgver=${VERSION}
          pkgrel=1
          pkgdesc="Tactile audio mixer for Arduino-based Linux control"
          arch=('x86_64')
          url="https://github.com/bernardopg/ioruba"
          license=('MIT')
          depends=('glibc' 'gtk3' 'webkit2gtk-4.1' 'libayatana-appindicator')
          makedepends=('npm' 'rust' 'cargo' 'pkgconf' 'webkit2gtk-4.1' 'gtk3' 'librsvg' 'patchelf' 'libappindicator-gtk3')
          source=("ioruba-\${pkgver}.tar.gz::https://github.com/bernardopg/ioruba/archive/refs/tags/v\${pkgver}.tar.gz")
          sha256sums=('${SOURCE_SHA256}')

          prepare() {
            cd "ioruba-\${pkgver}"
            npm ci
          }

          build() {
            cd "ioruba-\${pkgver}"
            npm --workspace @ioruba/desktop run tauri build -- --no-bundle
          }

          package() {
            cd "ioruba-\${pkgver}"

            install -Dm755 \
              "apps/desktop/src-tauri/target/release/ioruba-desktop" \
              "\${pkgdir}/usr/bin/ioruba-desktop"

            local _icons="apps/desktop/src-tauri/icons"
            install -Dm644 "\${_icons}/32x32.png" \
              "\${pkgdir}/usr/share/icons/hicolor/32x32/apps/ioruba.png"
            install -Dm644 "\${_icons}/64x64.png" \
              "\${pkgdir}/usr/share/icons/hicolor/64x64/apps/ioruba.png"
            install -Dm644 "\${_icons}/128x128.png" \
              "\${pkgdir}/usr/share/icons/hicolor/128x128/apps/ioruba.png"
            install -Dm644 "\${_icons}/128x128@2x.png" \
              "\${pkgdir}/usr/share/icons/hicolor/256x256/apps/ioruba.png"
            install -Dm644 "\${_icons}/app-icon.svg" \
              "\${pkgdir}/usr/share/icons/hicolor/scalable/apps/ioruba.svg"

            install -dm755 "\${pkgdir}/usr/share/applications"
            cat > "\${pkgdir}/usr/share/applications/ioruba.desktop" <<'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=Ioruba
          GenericName=Audio Mixer
          GenericName[pt_BR]=Mixer de Áudio
          Comment=Tactile audio mixer for Arduino-based Linux control
          Comment[pt_BR]=Mixer de áudio tátil para controle via Arduino no Linux
          Exec=ioruba-desktop
          Icon=ioruba
          Terminal=false
          Categories=AudioVideo;Audio;Mixer;
          Keywords=audio;mixer;volume;arduino;serial;hardware;potentiometer;
          StartupNotify=true
          StartupWMClass=Ioruba
          DESKTOP
          }
          EOF

          printf '%s\n' \
            'pkgbase = ioruba-desktop' \
            "$(printf '\t')pkgdesc = Tactile audio mixer for Arduino-based Linux control" \
            "$(printf '\t')pkgver = ${VERSION}" \
            "$(printf '\t')pkgrel = 1" \
            "$(printf '\t')url = https://github.com/bernardopg/ioruba" \
            "$(printf '\t')arch = x86_64" \
            "$(printf '\t')license = MIT" \
            "$(printf '\t')makedepends = npm" \
            "$(printf '\t')makedepends = rust" \
            "$(printf '\t')makedepends = cargo" \
            "$(printf '\t')makedepends = pkgconf" \
            "$(printf '\t')makedepends = webkit2gtk-4.1" \
            "$(printf '\t')makedepends = gtk3" \
            "$(printf '\t')makedepends = librsvg" \
            "$(printf '\t')makedepends = patchelf" \
            "$(printf '\t')makedepends = libappindicator-gtk3" \
            "$(printf '\t')depends = glibc" \
            "$(printf '\t')depends = gtk3" \
            "$(printf '\t')depends = webkit2gtk-4.1" \
            "$(printf '\t')depends = libayatana-appindicator" \
            "$(printf '\t')provides = ioruba" \
            "$(printf '\t')conflicts = ioruba" \
            "$(printf '\t')conflicts = ioruba-desktop-bin" \
            "$(printf '\t')replaces = ioruba" \
            "$(printf '\t')source = ioruba-${VERSION}.tar.gz::https://github.com/bernardopg/ioruba/archive/refs/tags/v${VERSION}.tar.gz" \
            "$(printf '\t')sha256sums = ${SOURCE_SHA256}" \
            '' \
            'pkgname = ioruba-desktop' \
            > "release-dist/arch/.SRCINFO"

          cat > "release-dist/arch/PKGBUILD-bin" <<EOF
          pkgname=ioruba-desktop-bin
          pkgver=${VERSION}
          pkgrel=1
          pkgdesc="Tactile audio mixer for Arduino-based Linux control (prebuilt AppImage)"
          arch=('x86_64')
          url="https://github.com/bernardopg/ioruba"
          license=('MIT')
          depends=('glibc' 'gtk3' 'webkit2gtk-4.1' 'libayatana-appindicator')
          provides=('ioruba-desktop' 'ioruba')
          conflicts=('ioruba-desktop' 'ioruba')
          replaces=('ioruba')
          source=(
            "${APPIMAGE_ASSET_NAME}::https://github.com/bernardopg/ioruba/releases/download/v\${pkgver}/${APPIMAGE_ASSET_NAME}"
            "ioruba.png::https://raw.githubusercontent.com/bernardopg/ioruba/v\${pkgver}/apps/desktop/src-tauri/icons/128x128.png"
            "ioruba.svg::https://raw.githubusercontent.com/bernardopg/ioruba/v\${pkgver}/apps/desktop/src-tauri/icons/app-icon.svg"
            "run-appimage-compat.sh::https://raw.githubusercontent.com/bernardopg/ioruba/v\${pkgver}/scripts/run-appimage-compat.sh"
          )
          sha256sums=('${APPIMAGE_SHA256}' '${ICON_SHA256}' '${ICON_SVG_SHA256}' '${COMPAT_SHA256}')

          package() {
            install -Dm755 "\${srcdir}/${APPIMAGE_ASSET_NAME}" "\${pkgdir}/opt/ioruba/ioruba.AppImage"
            install -Dm755 "\${srcdir}/run-appimage-compat.sh" "\${pkgdir}/opt/ioruba/run-appimage-compat.sh"
            install -Dm644 "\${srcdir}/ioruba.png" "\${pkgdir}/usr/share/icons/hicolor/128x128/apps/ioruba.png"
            install -Dm644 "\${srcdir}/ioruba.svg" "\${pkgdir}/usr/share/icons/hicolor/scalable/apps/ioruba.svg"

            install -dm755 "\${pkgdir}/usr/share/applications"
            cat > "\${pkgdir}/usr/share/applications/ioruba.desktop" <<'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=Ioruba
          GenericName=Audio Mixer
          GenericName[pt_BR]=Mixer de Áudio
          Comment=Tactile audio mixer for Arduino-based Linux control
          Comment[pt_BR]=Mixer de áudio tátil para controle via Arduino no Linux
          Exec=ioruba-desktop
          Icon=ioruba
          Terminal=false
          Categories=AudioVideo;Audio;Mixer;
          Keywords=audio;mixer;volume;arduino;serial;hardware;potentiometer;
          StartupNotify=true
          StartupWMClass=Ioruba
          DESKTOP

            printf '%s\n' \
              '#!/usr/bin/env sh' \
              'exec /opt/ioruba/run-appimage-compat.sh /opt/ioruba/ioruba.AppImage "$@"' \
              > "\${pkgdir}/usr/bin/ioruba-desktop"
            chmod 755 "\${pkgdir}/usr/bin/ioruba-desktop"
          }
          EOF

          printf '%s\n' \
            'pkgbase = ioruba-desktop-bin' \
            "$(printf '\t')pkgdesc = Tactile audio mixer for Arduino-based Linux control (prebuilt AppImage)" \
            "$(printf '\t')pkgver = ${VERSION}" \
            "$(printf '\t')pkgrel = 1" \
            "$(printf '\t')url = https://github.com/bernardopg/ioruba" \
            "$(printf '\t')arch = x86_64" \
            "$(printf '\t')license = MIT" \
            "$(printf '\t')provides = ioruba-desktop" \
            "$(printf '\t')provides = ioruba" \
            "$(printf '\t')conflicts = ioruba-desktop" \
            "$(printf '\t')conflicts = ioruba" \
            "$(printf '\t')replaces = ioruba" \
            "$(printf '\t')depends = glibc" \
            "$(printf '\t')depends = gtk3" \
            "$(printf '\t')depends = webkit2gtk-4.1" \
            "$(printf '\t')depends = libayatana-appindicator" \
            "$(printf '\t')source = ${APPIMAGE_ASSET_NAME}::https://github.com/bernardopg/ioruba/releases/download/v${VERSION}/${APPIMAGE_ASSET_NAME}" \
            "$(printf '\t')source = ioruba.png::https://raw.githubusercontent.com/bernardopg/ioruba/v${VERSION}/apps/desktop/src-tauri/icons/128x128.png" \
            "$(printf '\t')source = ioruba.svg::https://raw.githubusercontent.com/bernardopg/ioruba/v${VERSION}/apps/desktop/src-tauri/icons/app-icon.svg" \
            "$(printf '\t')source = run-appimage-compat.sh::https://raw.githubusercontent.com/bernardopg/ioruba/v${VERSION}/scripts/run-appimage-compat.sh" \
            "$(printf '\t')sha256sums = ${APPIMAGE_SHA256}" \
            "$(printf '\t')sha256sums = ${ICON_SHA256}" \
            "$(printf '\t')sha256sums = ${ICON_SVG_SHA256}" \
            "$(printf '\t')sha256sums = ${COMPAT_SHA256}" \
            '' \
            'pkgname = ioruba-desktop-bin' \
            > "release-dist/arch/.SRCINFO-bin"

          cp "release-dist/arch/PKGBUILD" "release-dist/arch/PKGBUILD-v${VERSION}"
          cp "release-dist/arch/PKGBUILD-bin" "release-dist/arch/PKGBUILD-bin-v${VERSION}"
          cp "release-dist/arch/.SRCINFO" "release-dist/arch/SRCINFO"
          cp "release-dist/arch/.SRCINFO-bin" "release-dist/arch/SRCINFO-bin"

      - name: Remove existing Arch packaging assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          VERSION="${RELEASE_TAG#v}"
          REPO="${GITHUB_REPOSITORY}"

          RELEASE_ID="$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/releases/tags/${RELEASE_TAG}" | jq -r '.id')"

          for asset_name in \
            PKGBUILD \
            SRCINFO \
            "PKGBUILD-v${VERSION}" \
            PKGBUILD-bin \
            SRCINFO-bin \
            "PKGBUILD-bin-v${VERSION}" \
            "ioruba-${VERSION}.tar.gz"
          do
            ASSET_ID="$(curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/releases/${RELEASE_ID}/assets" \
              | jq -r --arg NAME "${asset_name}" '.[] | select(.name == $NAME) | .id')"

            if [ -n "${ASSET_ID}" ]; then
              curl -fsSL -X DELETE \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${REPO}/releases/assets/${ASSET_ID}"
            fi
          done

      - name: Upload PKGBUILD to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          VERSION="${RELEASE_TAG#v}"

          for asset in \
            release-dist/arch/PKGBUILD \
            release-dist/arch/SRCINFO \
            "release-dist/arch/PKGBUILD-v${VERSION}" \
            release-dist/arch/PKGBUILD-bin \
            release-dist/arch/SRCINFO-bin \
            "release-dist/arch/PKGBUILD-bin-v${VERSION}" \
            "release-dist/arch/ioruba-${VERSION}.tar.gz"
          do
            gh release upload "${RELEASE_TAG}" "${asset}" --clobber
          done

  firmware:
    name: Firmware Bundle
    needs:
      - prepare-release-notes
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2.0.0

      - name: Install Arduino AVR core
        run: |
          arduino-cli config init --overwrite
          arduino-cli core update-index
          arduino-cli core install arduino:avr

      - name: Build firmware
        run: |
          mkdir -p release-dist
          arduino-cli compile \
            --fqbn arduino:avr:nano \
            --output-dir release-dist/firmware \
            firmware/arduino/ioruba-controller

      - name: Upload firmware to release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            release-dist/firmware/*

  attest-and-checksum:
    name: Attest Provenance and Checksums
    needs:
      - desktop-bundles
      - desktop-appimage
      - firmware
    if: ${{ always() && needs.desktop-bundles.result != 'cancelled' && needs.desktop-appimage.result != 'cancelled' && needs.firmware.result != 'cancelled' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p release-assets

          gh release download "${RELEASE_TAG}" \
            --pattern "*.deb" \
            --pattern "*.rpm" \
            --pattern "*.AppImage" \
            --pattern "*.msi" \
            --pattern "*-setup.exe" \
            --pattern "*.app.tar.gz" \
            --dir release-assets \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber || true

          ls -lh release-assets/

      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload SHA256SUMS to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${RELEASE_TAG}" release-assets/SHA256SUMS.txt --clobber \
            --repo "${GITHUB_REPOSITORY}"

      - name: Attest .deb
        uses: actions/attest-build-provenance@v4
        if: hashFiles('release-assets/*.deb') != ''
        with:
          subject-path: release-assets/*.deb

      - name: Attest .rpm
        uses: actions/attest-build-provenance@v4
        if: hashFiles('release-assets/*.rpm') != ''
        with:
          subject-path: release-assets/*.rpm

      - name: Attest .AppImage
        uses: actions/attest-build-provenance@v4
        if: hashFiles('release-assets/*.AppImage') != ''
        with:
          subject-path: release-assets/*.AppImage

      - name: Attest .msi
        uses: actions/attest-build-provenance@v4
        if: hashFiles('release-assets/*.msi') != ''
        with:
          subject-path: release-assets/*.msi

      - name: Attest Windows setup installer
        uses: actions/attest-build-provenance@v4
        if: hashFiles('release-assets/*-setup.exe') != ''
        with:
          subject-path: release-assets/*-setup.exe

      - name: Attest macOS app bundle
        uses: actions/attest-build-provenance@v4
        if: hashFiles('release-assets/*.app.tar.gz') != ''
        with:
          subject-path: release-assets/*.app.tar.gz

  aur-publish:
    name: Publish to AUR
    needs:
      - arch-pkgbuild
      - attest-and-checksum
    if: ${{ always() && needs.arch-pkgbuild.result == 'success' && needs.attest-and-checksum.result != 'cancelled' }}
    runs-on: ubuntu-latest

    steps:
      - name: Install AUR SSH key
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${AUR_SSH_PRIVATE_KEY}" > ~/.ssh/aur_ed25519
          chmod 600 ~/.ssh/aur_ed25519
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<'SSHCONF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur_ed25519
            User aur
          SSHCONF
          chmod 600 ~/.ssh/config

      - name: Download PKGBUILD assets from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p aur-dist/ioruba-desktop aur-dist/ioruba-desktop-bin

          gh release download "${RELEASE_TAG}" \
            --pattern "PKGBUILD" \
            --pattern "SRCINFO" \
            --dir aur-dist/ioruba-desktop \
            --repo "${GITHUB_REPOSITORY}"

          gh release download "${RELEASE_TAG}" \
            --pattern "PKGBUILD-bin" \
            --pattern "SRCINFO-bin" \
            --dir aur-dist/ioruba-desktop-bin \
            --repo "${GITHUB_REPOSITORY}"

          mv aur-dist/ioruba-desktop-bin/PKGBUILD-bin aur-dist/ioruba-desktop-bin/PKGBUILD
          mv aur-dist/ioruba-desktop-bin/SRCINFO-bin  aur-dist/ioruba-desktop-bin/.SRCINFO
          mv aur-dist/ioruba-desktop/SRCINFO          aur-dist/ioruba-desktop/.SRCINFO

      - name: Configure git
        run: |
          git config --global user.name "bernardopg"
          git config --global user.email "bernardo.gomes@bebitterbebetter.com.br"

      - name: Push ioruba-desktop to AUR
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"

          git clone ssh://aur@aur.archlinux.org/ioruba-desktop.git aur-clone/ioruba-desktop
          cp aur-dist/ioruba-desktop/PKGBUILD aur-clone/ioruba-desktop/PKGBUILD
          cp aur-dist/ioruba-desktop/.SRCINFO  aur-clone/ioruba-desktop/.SRCINFO

          cd aur-clone/ioruba-desktop
          if git diff --quiet HEAD; then
            echo "ioruba-desktop: sem mudancas, push ignorado."
          else
            git add PKGBUILD .SRCINFO
            git commit -m "chore: update to v${VERSION}"
            git push origin master
          fi

      - name: Push ioruba-desktop-bin to AUR
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"

          git clone ssh://aur@aur.archlinux.org/ioruba-desktop-bin.git aur-clone/ioruba-desktop-bin
          cp aur-dist/ioruba-desktop-bin/PKGBUILD aur-clone/ioruba-desktop-bin/PKGBUILD
          cp aur-dist/ioruba-desktop-bin/.SRCINFO  aur-clone/ioruba-desktop-bin/.SRCINFO

          cd aur-clone/ioruba-desktop-bin
          if git diff --quiet HEAD; then
            echo "ioruba-desktop-bin: sem mudancas, push ignorado."
          else
            git add PKGBUILD .SRCINFO
            git commit -m "chore: update to v${VERSION}"
            git push origin master
          fi
