name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpulse-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            libsqlite3-dev

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6.6'
          enable-stack: true
          stack-version: 'latest'

      - name: Cache Stack dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.stack
            .stack-work
          key: ${{ runner.os }}-stack-${{ hashFiles('stack.yaml.lock') }}
          restore-keys: |
            ${{ runner.os }}-stack-

      - name: Build release binary
        run: |
          stack build --copy-bins --local-bin-path ./dist
          strip ./dist/ioruba

      - name: Create tarball
        run: |
          mkdir -p ioruba-release
          cp ./dist/ioruba ioruba-release/
          cp -r config ioruba-release/
          cp README.md ioruba-release/
          cp LICENSE ioruba-release/
          tar -czf ioruba-linux-x64.tar.gz ioruba-release/

      - name: Generate changelog
        id: changelog
        run: |
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ioruba-linux-x64.tar.gz
          body: |
            ## Changes
            ${{ steps.changelog.outputs.CHANGELOG }}

            ## Installation
            ```bash
            tar -xzf ioruba-linux-x64.tar.gz
            cd ioruba-release
            ./ioruba
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
