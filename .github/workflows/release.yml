name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpulse-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            libsqlite3-dev

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6.6'
          enable-stack: true
          stack-version: 'latest'

      - name: Cache Stack dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.stack
            .stack-work
          key: ${{ runner.os }}-stack-release-${{ hashFiles('stack.yaml.lock', 'package.yaml') }}
          restore-keys: |
            ${{ runner.os }}-stack-release-

      - name: Build release binary
        run: |
          stack build --copy-bins --local-bin-path ./dist
          strip ./dist/iaruba

      - name: Create tarball
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p iaruba-${VERSION}
          cp ./dist/iaruba iaruba-${VERSION}/
          cp -r config iaruba-${VERSION}/
          cp README.md iaruba-${VERSION}/
          cp LICENSE iaruba-${VERSION}/
          tar -czf iaruba-${VERSION}-linux-x86_64.tar.gz iaruba-${VERSION}/

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
          {
            echo "CHANGELOG<<EOF"
            if [ -n "$PREV_TAG" ]; then
              git log --pretty=format:"- %s (%h)" "${PREV_TAG}"..HEAD
            else
              git log --pretty=format:"- %s (%h)"
            fi
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            iaruba-*-linux-x86_64.tar.gz
          body: |
            ## Changes
            ${{ steps.changelog.outputs.CHANGELOG }}

            ## Installation
            ```bash
            tar -xzf iaruba-*-linux-x86_64.tar.gz
            cd iaruba-*/
            ./iaruba
            ```

            ## System Requirements
            - Linux (x86_64)
            - PulseAudio or PipeWire
            - GTK+ 3
          generate_release_notes: true
