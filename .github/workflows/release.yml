name: Release Artifacts

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to build, for example v0.2.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    name: Build Release Bundle
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ github.event.release.tag_name || github.event.inputs.tag_name || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.6.6"
          enable-stack: true
          stack-version: latest

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Cache Stack
        uses: actions/cache@v5
        with:
          path: |
            ~/.stack
            .stack-work
          key: ${{ runner.os }}-stack-release-${{ hashFiles('stack.yaml.lock', 'package.yaml') }}
          restore-keys: |
            ${{ runner.os }}-stack-release-
            ${{ runner.os }}-stack-

      - name: Build binaries
        run: |
          mkdir -p dist
          stack build --copy-bins --local-bin-path ./dist
          strip ./dist/ioruba
          strip ./dist/test-serial

      - name: Install Arduino core
        run: |
          arduino-cli config init --overwrite
          arduino-cli core update-index
          arduino-cli core install arduino:avr

      - name: Build firmware
        run: |
          mkdir -p dist-firmware
          arduino-cli compile --fqbn arduino:avr:nano --output-dir ./dist-firmware arduino/ioruba-nano-3knobs

      - name: Build release artifacts
        run: |
          set -euo pipefail
          version="${TAG_NAME#v}"
          bash ./scripts/release/build_release_artifacts.sh "${version}" ./release-dist

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: |
            release-dist/*
          generate_release_notes: false
